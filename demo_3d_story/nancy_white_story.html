<style>

<script>
try {

const P={fabric:0x0078D4,iq:0x00B7C3,foundry:0x8661C5,rti:0xFFB900,ok:0x107C10,bad:0xD13438,bg:0x06060C};

ctrl.enableDamping=true;ctrl.dampingFactor=.06;ctrl.enablePan=false;

ctrl.autoRotate=true;ctrl.autoRotateSpeed=.08;

(function(){

  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x5566AA,size:.2,transparent:true,opacity:.45,sizeAttenuation:true})));
})();

scene.add(new THREE.AmbientLight(0x252540,.6));

sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;scene.add(sun);

/* ═══════ MATERIALS ═══════ */

/* ═══════ GEOMETRY HELPERS ═══════ */
const bx=(w,h,d,m)=>{const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.castShadow=true;o.receiveShadow=true;return o};
const cy=(rt,rb,h,m,s=32)=>{const o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m);o.castShadow=true;return o};
const sp=(r,m,s=32)=>new THREE.Mesh(new THREE.SphereGeometry(r,s,s),m);

function glow(r,color,intensity){
  intensity=intensity||.5;
  const m=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:intensity,roughness:.15,metalness:.1,transparent:true,opacity:.92});
  const o=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),m);
  o.add(new THREE.Mesh(new THREE.SphereGeometry(r*1.6,16,16),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.04})));
  o.add(new THREE.Mesh(new THREE.SphereGeometry(r*2.5,12,12),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.015})));

}

}
function txt(text,opts){

  x.font=weight+' '+size+'px Inter,sans-serif';x.fillStyle=color;x.textBaseline='middle';

}

}

/* ═══ Streaming dots — travel along a path ═══ */
function createStreamDots(group,count,color,intensity){
  var dots=[];
  for(var i=0;i<count;i++){
    var d=glow(.04,color,intensity||1.5);d.visible=false;group.add(d);
    dots.push({mesh:d,t:Math.random(),speed:.15+Math.random()*.12});
  }
  return dots;
}
function animStream(dots,pathPts,dt){
  for(var k=0;k<dots.length;k++){
    var fd=dots[k];fd.t+=dt*fd.speed;if(fd.t>1)fd.t-=1;fd.mesh.visible=true;

/* ═══════ NAVIGATION ═══════ */
function go(i){
  if(i<0||i>=SCENES||i===cur)return;
  groups[cur].visible=false;if(exits[cur])exits[cur]();
  cur=i;groups[cur].visible=true;if(enters[cur])enters[cur]();
  document.querySelectorAll('.dot').forEach(function(d,j){d.classList.toggle('active',j===cur)});
  document.getElementById('scene-lbl').textContent=(cur+1)+' / '+SCENES;
  if(autoPlay){clearTimeout(autoTimer);autoTimer=setTimeout(function(){go(cur+1)},16000)}
}
var next=function(){go(cur+1)},prev=function(){go(cur-1)};
var navEl=document.getElementById('nav');
for(var ni=0;ni<SCENES;ni++){(function(idx){
  var d=document.createElement('div');d.className='dot'+(idx===0?' active':'');
  d.addEventListener('click',function(){go(idx)});navEl.appendChild(d);
})(ni)}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  else if(e.key==='ArrowLeft')prev();
  else if(e.key==='a'||e.key==='A')toggleAuto();
  else if(e.key>='1'&&e.key<='5')go(+e.key-1);
});
R.domElement.addEventListener('click',function(e){if(e.target===R.domElement)next()});
var btnAuto=document.getElementById('btn-auto');
function toggleAuto(){autoPlay=!autoPlay;btnAuto.classList.toggle('on',autoPlay);btnAuto.textContent=autoPlay?'Auto: ON':'Auto';
  if(autoPlay)autoTimer=setTimeout(function(){go(cur+1)},16000);else clearTimeout(autoTimer)}
btnAuto.addEventListener('click',toggleAuto);
window.addEventListener('resize',function(){var w=innerWidth,h=innerHeight;cam.aspect=w/h;cam.updateProjectionMatrix();R.setSize(w,h);comp.setSize(w,h)});

/* ═══════ RENDER ═══════ */
function animate(){requestAnimationFrame(animate);var dt=clock.getDelta(),t=clock.getElapsedTime();ctrl.update();if(ticks[cur])ticks[cur](dt,t);comp.render()}
var bf=document.getElementById('bar-fill');var pct=0;
var li=setInterval(function(){pct+=7+Math.random()*13;if(pct>=100){pct=100;clearInterval(li);
  setTimeout(function(){document.getElementById('loader').classList.add('done');groups[0].visible=true;if(enters[0])enters[0]();document.getElementById('scene-lbl').textContent='1 / '+SCENES},500)}
  bf.style.width=pct+'%'},110);
animate();

} catch(e) {
  var d=document.getElementById('loader');
  if(d){d.innerHTML='<div style="color:#FF4444;padding:40px;text-align:left;max-width:700px;font-family:monospace;font-size:13px"><h2 style="color:#FF4444;margin-bottom:12px">Init Error</h2><p>'+e.message+'</p><pre style="color:#AA8800;margin-top:12px;font-size:11px;white-space:pre-wrap;max-height:400px;overflow:auto">'+(e.stack||'')+'</pre></div>';d.style.display='flex'}
}
</script>
</body>
</html>
